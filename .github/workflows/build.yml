name: Build all targets

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  define-matrix:
    name: Define build matrix
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.bear.outputs.targets }}

    steps:
      - name: Install Bear dependencies
        run: pip3 install loguru --break-system-packages

      - name: Cache Rust toolchains and Cargo git checkouts
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains/
            ~/.cargo/git/
          key: ${{ runner.os }}-rust-toolchains

      - uses: actions/checkout@v4
      - name: Define targets
        id: bear
        run: |
          ln -s /usr/bin/python3 /usr/local/bin/python3
          source build/env.sh
          echo targets=$(bear target list) >> "$GITHUB_OUTPUT"

  build:
    name: Build target
    runs-on: ubuntu-latest
    needs: define-matrix
    strategy:
      matrix:
        target: ${{ fromJSON(needs.define-matrix.outputs.targets) }}

    steps:
      - name: Cache Rust toolchains and Cargo git checkouts
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains/
            ~/.cargo/git/
          key: ${{ runner.os }}-rust-toolchains

      - uses: actions/checkout@v4
      - name: Install arm-none-eabi-gcc
        run: chmod +x ./.github/arm_none_eabi_ubuntu_install.sh && ./.github/arm_none_eabi_ubuntu_install.sh

      - name: Set up Bear
        run: |
          pip3 install loguru --break-system-packages
          ln -s /usr/bin/python3 /usr/local/bin/python3

      - name: Verify arm-none-eabi-gcc version
        run: arm-none-eabi-gcc --version \ 
          && arm-none-eabi-g++ --version \ 
          && arm-none-eabi-gdb --version \
          && arm-none-eabi-size --version \

      - name: Build
        run: source build/env.sh && bear build ${{ matrix.target }} --release
        # TODO: when there will be any tests, make sure that they are executed here
        # TODO: make it also upload all built binaries
        # For that I will most likely need a modification to the task runner commands so
        # it automatically extracts any build artifacts and stores them

      # - name: Analyze bloat
      #   run: cargo install cargo-bloat && task ${{ matrix.target }}:bloat -- --release -n 50
